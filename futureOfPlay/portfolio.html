<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poiret+One&display=swap" rel="stylesheet">

       
        <meta charset="UTF-8" />
        <title>Future of Play Scholarship</title>
        
        <style>
        * {
            margin: 0px;
            padding: 0px;
        }
            
        #title-banner {
            height: 70vh;
            background-color: #89bf8b;
        }

        #title-banner h1 {
            color: #e0efe1;
            font-size: 55px;
            text-align: center;
            padding-top: 30vh;
            font-family: 'Overpass', sans-serif;
        }

        #projects {
            height: 1000px;
            font-size: 30px;
            font-family: 'Poiret One', cursive;
            text-align: center;
        }

        #projects h2 {
            padding-top: 35px;
        }
        
        .visual {
            width: 60%;
            max-width: 600px;
            height: auto;
        }
        </style>
        
    </head>
    <body>
        <div id=title-banner>
            <h1>Future of Play Toy Design Portfolio</h1>
        </div>
        
        <div id=projects>
            <h2>Myoelectric Prosthetic Arm</h2>
            <video src="prostheticArm/openClose.mp4" controls width="600" class=visual>Your browser does not support the video tag.</video>
            <img src="prostheticArm/whole.png" alt="Overview of Prosthetic Arm" class=visual>
            <img src="prostheticArm/top.png" alt="Top of Prosthetic Arm" class=visual>
            <img src="prostheticArm/bottom.png" alt="Bottom of Prosthetic Arm" class=visual>
            <img src="prostheticArm/wires.png" alt="Wires of Prosthetic Arm" class=visual>
            <br>
            
            <h2>Stepper Motor Piano</h2>
            <video src="stepperMotorPiano/playing.mp4" controls width="600" class=visual>Your browser does not support the video tag.</video>
            <img src="stepperMotorPiano/top.png" alt="Top of Stepper Motor Piano" class=visual>
            <img src="stepperMotorPiano/front.png" alt="Front of Stepper Motor Piano" class=visual>
            <img src="stepperMotorPiano/back.png" alt="Back of Stepper Motor Piano" class=visual>
            <img src="stepperMotorPiano/inside1.png" alt="Inside of Stepper Motor Piano" class=visual>
            <img src="stepperMotorPiano/inside2.png" alt="Inside of Stepper Motor Piano" class=visual>
            <br>
            
            <h2>Mousetrap Racecar</h2>
            <video src="mousetrapRacecar/drive.mp4" controls width="600" class=visual>Your browser does not support the video tag.</video>
            <img src="mousetrapRacecar/top.png" alt="Top of Mousetrap Racecar" class=visual>
            <img src="mousetrapRacecar/side.png" alt="Side of Mousetrap Racecar" class=visual>
            <img src="mousetrapRacecar/wound.png" alt="Wound Up String" class=visual>
            
            <br>
            
            <h2>Spring Launcher</h2>
            <video src="springLauncher/shoot.mp4" controls width="600" class=visual>Your browser does not support the video tag.</video>
            <img src="springLauncher/launcher.png" alt="Side of Spring Launcher at 45 Degrees" class=visual>
            <img src="springLauncher/side1.png" alt="Side of Spring Launcher at 60 Degrees" class=visual>
            <img src="springLauncher/side2.png" alt="Side of Spring Launcher at 45 Degrees" class=visual>
            <img src="springLauncher/spring.png" alt="Spring Launcher With Spring Attached" class=visual>
            <br>
            
            <h2>Crochet & Sewn Plushies</h2>
            <img src="plushies/group.png" alt="All Three Plushies" class=visual>
            <img src="plushies/miku.png" alt="Hatsune Miku" class=visual>
            <img src="plushies/monkey.png" alt="Monkey" class=visual>
            <img src="plushies/duolingo.png" alt="Duolingo" class=visual>
            <br>
        </div>
    </body>
</html>
